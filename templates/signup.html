<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up - Finance Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh;">
    <div class="card" style="width: 90%; max-width: 400px; text-align:center;">
        <h2 style="margin-bottom: 20px;">Create Account</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div style="color: red; margin-bottom: 15px; font-weight: bold;">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/signup">
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required style="padding: 15px; font-size: 16px;">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password" required style="padding: 15px; font-size: 16px;">
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="padding: 15px;">Sign Up</button>
        </form>
        <p style="margin-top: 20px;">Already have an account? <a href="/login" style="color: #4CAF50;">Login</a></p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Tracker</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/static/style.css">
    <meta name="theme-color" content="#4CAF50">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Tab Navigation -->
        <nav class="bottom-nav">
        <a href="#" class="nav-item active" id="tab-input" onclick="switchTab('input')">
            <i class="fas fa-plus-circle"></i><span>Add</span>
        </a>
        <a href="#" class="nav-item" id="tab-analysis" onclick="switchTab('analysis')">
            <i class="fas fa-chart-pie"></i><span>Analysis</span>
        </a>
        <a href="/logout" class="nav-item" id="tab-logout">
            <i class="fas fa-sign-out-alt"></i><span>Logout</span>
        </a>
    </nav>

    <!-- Content Sections -->
    <main>
        <!-- INPUT SECTION -->
        <section id="section-input" class="tab-content active">
            <div class="card">
                <h2>New Transaction</h2>
                <form id="transaction-form">
                    
                    <div class="form-group row">
                        <label class="radio-label">
                            <input type="radio" name="type" value="expense" checked onchange="updateCategories()"> Expense
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="type" value="income" onchange="updateCategories()"> Income
                        </label>
                    </div>

                    <div class="form-group">
                        <label>Amount ($)</label>
                        <input type="number" id="amount" step="0.01" required placeholder="0.00">
                    </div>

                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" onchange="handleCategoryChange()" required></select>
                        <input type="text" id="custom-category" class="hidden custom-input" placeholder="Enter Custom Category">
                    </div>

                    <div class="form-group" id="subcategory-group">
                        <label>Subcategory</label>
                        <select id="subcategory" onchange="handleSubcategoryChange()"></select>
                        <input type="text" id="custom-subcategory" class="hidden custom-input" placeholder="Enter Custom Subcategory">
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Add Transaction</button>
                    <div id="status-msg" class="hidden">Saved successfully!</div>
                </form>
            </div>

            <div class="card">
                <h3>Recent Added Transactions</h3>
                <div class="table-responsive">
                    <table id="input-transactions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Info</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- ANALYSIS SECTION -->
        <section id="section-analysis" class="tab-content">
                        <div class="card">
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="display:inline-block; margin-right:10px;">Filter Range:</label>
                    <select id="date-filter" onchange="handleDateFilterChange()" style="width: auto; display: inline-block;">
                        <option value="current_month">Current Month</option>
                        <option value="last_30">Last 30 Days</option>
                        <option value="last_90">Last 3 Months</option>
                        <option value="ytd">Year to Date (YTD)</option>
                        <option value="all">All Time</option>
                        <option value="custom">Specific Start Date</option>
                    </select>
                    <input type="date" id="custom-start-date" class="hidden" onchange="updateAnalysisUI()" style="width: auto; display: inline-block; margin-left: 5px;">
                </div>
            </div>

            <div class="card summary-cards">
                <div class="summary-box income">
                    <h4>Total Income</h4>
                    <p id="total-income">$0.00</p>
                </div>
                <div class="summary-box expense">
                    <h4>Total Expense</h4>
                    <p id="total-expense">$0.00</p>
                </div>
                <div class="summary-box balance">
                    <h4>Net Balance</h4>
                    <p id="net-balance">$0.00</p>
                </div>
            </div>

            <div class="card chart-container">
                <h3>Expenses by Category</h3>
                <canvas id="expenseChart"></canvas>
            </div>
            
            <div class="card chart-container">
                <h3>Income by Category</h3>
                <canvas id="incomeChart"></canvas>
            </div>

            <div class="card">
                <h3>Recent Transactions</h3>
                <div class="table-responsive">
                    <table id="transactions-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Type</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Filled by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/app.js"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker error', err));
            });
        }
    </script>
</body>
</html>
